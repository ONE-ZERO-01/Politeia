# Politeia — Adam & Eve scenario
# Start from exactly 2 individuals and let civilization emerge through reproduction.

# ── Initial conditions from CSV ──────────────────────────────────────
initial_conditions_file = examples/adam_eve.csv
initial_particles = 2

# ── Domain ───────────────────────────────────────────────────────────
domain_xmin = 0.0
domain_xmax = 100.0
domain_ymin = 0.0
domain_ymax = 100.0

# ── Time stepping ────────────────────────────────────────────────────
dt = 0.01
total_steps = 500000
output_interval = 1000
compact_interval = 500

# ── Physics ──────────────────────────────────────────────────────────
temperature = 0.5
friction = 1.0
social_strength = 5.0
social_distance = 2.0
interaction_range = 5.0

# ── Resources ────────────────────────────────────────────────────────
initial_wealth = 20.0
survival_threshold = 0.5
consumption_rate = 0.02
base_production = 1.0

# ── Gender & reproduction (critical for 2-person start) ──────────────
gender_enabled = true
sex_ratio = 0.5
max_fertility = 0.05
peak_fertility_age = 25.0
puberty_age = 14.0
menopause_age = 45.0
gestation_time = 0.5
nursing_time = 0.3
male_cooldown = 0.1
mate_range = 8.0
wealth_birth_cost = 0.15
min_wealth_to_breed = 2.0
mutation_strength = 0.5
culture_mutation_scale = 0.1
epsilon_mutation_scale = 0.005
fertility_alpha = 2.0
inheritance_model = contribution

# ── Mortality (gentle for small populations) ─────────────────────────
gompertz_alpha = 5e-5
max_age = 90.0
accident_rate = 1e-5
starvation_sigmoid_k = 8.0

# ── Technology ───────────────────────────────────────────────────────
tech_drift_rate = 0.0005
tech_spread_rate = 0.02
tech_jump_base_rate = 1e-5
tech_jump_magnitude = 0.3

# ── Culture ──────────────────────────────────────────────────────────
culture_dim = 2
assimilation_rate = 0.02
culture_mate_threshold = 5.0

# ── Carrying capacity ───────────────────────────────────────────────
carrying_capacity_enabled = true
carrying_capacity_base = 200.0
density_radius = 10.0

# ── Loyalty & hierarchy ─────────────────────────────────────────────
loyalty_enabled = true
conquest_enabled = true
tax_rate = 0.05

# ── Plague (disabled for small populations) ──────────────────────────
plague_enabled = false

# ── Terrain ──────────────────────────────────────────────────────────
terrain_type = river

# ── Output ───────────────────────────────────────────────────────────
output_dir = examples/adam_eve_output
network_window_factor = 5

# ── Control ──────────────────────────────────────────────────────────
random_seed = 2024
