# ═══════════════════════════════════════════════════════════════════════
# Politeia 标准算例：genesis_hyde_100k
#
# 名称: HYDE 创世纪（10万）
# 校准源: HYDE 3.3 (Klein Goldewijk et al. 2023)
# 时代:   公元前 10,000 年（新石器过渡期）
# 粒子数: 100,000（1 agent ≈ 45 真实人口）
#
# 全球人口: 4,501,152 (HYDE 3.3 基线)
# 区域分布: 29 个考古文化区，按 HYDE 3.3 国家级数据校准
#   - 北美洲: 26.3% (Clovis/Folsom 传统)
#   - 南美洲: 24.4% (安第斯 + 亚马逊)
#   - 亚  洲: 26.3% (新月沃地 + 东亚农业起源)
#   - 欧  洲: 10.7% (中石器时代)
#   - 大洋洲:  7.2% (澳大利亚原住民)
#   - 非  洲:  5.1% (撒哈拉以南)
#
# 引用:
#   [1] Klein Goldewijk et al. (2023), HYDE 3.3 dataset
#   [2] McEvedy & Jones (1978), Atlas of World Population History
#   [3] Biraben (1980), regional prehistoric population estimates
#
# 生成工具: scripts/generate_genesis.py --n 100000 --era 10000bce
# ═══════════════════════════════════════════════════════════════════════

# ── 初始条件 ─────────────────────────────────────────────────────────
initial_conditions_file = examples/genesis_hyde_100k.csv
initial_particles = 100000

# ── 域：全球经纬度坐标 ───────────────────────────────────────────────
domain_xmin = -180.0
domain_xmax = 180.0
domain_ymin = -85.0
domain_ymax = 85.0

# ── 时间步 ───────────────────────────────────────────────────────────
# dt = 0.01 year; 分阶段运行：
# Phase 1: 10,000 BCE → 5,000 BCE (500,000 steps, ~5000 年)
# Phase 2: 5,000 BCE → 1 CE        (500,000 steps, ~5000 年)
# Phase 3: 1 CE → 2000 CE          (200,000 steps, ~2000 年)
dt = 0.01
total_steps = 500000
output_interval = 5000
compact_interval = 2000

# ── 物理参数（全球尺度调整）─────────────────────────────────────────
temperature = 0.3
friction = 1.0
social_strength = 3.0
social_distance = 1.0
interaction_range = 3.0

# ── 资源 ─────────────────────────────────────────────────────────────
initial_wealth = 8.0
survival_threshold = 0.3
consumption_rate = 0.01
base_production = 0.3

# ── 性别与繁殖 ───────────────────────────────────────────────────────
gender_enabled = true
sex_ratio = 0.5
max_fertility = 0.003
peak_fertility_age = 22.0
puberty_age = 14.0
menopause_age = 45.0
gestation_time = 0.75
nursing_time = 2.0
male_cooldown = 0.1
mate_range = 3.0
wealth_birth_cost = 0.2
min_wealth_to_breed = 2.0
mutation_strength = 0.3
culture_mutation_scale = 0.15
epsilon_mutation_scale = 0.005
fertility_alpha = 2.0
inheritance_model = contribution

# ── 死亡（史前条件：高婴儿死亡率，低预期寿命） ──────────────────────
gompertz_alpha = 2e-4
max_age = 75.0
accident_rate = 5e-4
starvation_sigmoid_k = 10.0

# ── 寿命耦合（财富和技术延长寿命） ──────────────────────────────────
lifespan_wealth_enabled = true
lifespan_wealth_k = 15.0
lifespan_wealth_ref = 20.0
lifespan_tech_enabled = true
lifespan_tech_k = 10.0
lifespan_tech_ref = 3.0

# ── 技术演化 ─────────────────────────────────────────────────────────
tech_drift_rate = 0.0002
tech_spread_rate = 0.01
tech_jump_base_rate = 5e-6
tech_jump_magnitude = 0.3
tech_jump_knowledge_scale = 1.0

# ── 文化 ─────────────────────────────────────────────────────────────
culture_dim = 2
assimilation_rate = 0.01
culture_mate_threshold = 3.0
repulsion_threshold = 2.0

# ── 承载力 ───────────────────────────────────────────────────────────
carrying_capacity_enabled = true
carrying_capacity_base = 80.0
density_radius = 5.0

# ── 忠诚与层级 ───────────────────────────────────────────────────────
loyalty_enabled = true
tax_rate = 0.05
loyalty_protection_gain = 0.1
loyalty_tax_drain = 0.05

# ── 征服 ─────────────────────────────────────────────────────────────
conquest_enabled = true
conquest_power_ratio = 1.5
conquest_base_prob = 0.005

# ── 战争增强 ─────────────────────────────────────────────────────────
war_cost_enabled = true
war_cost_attacker = 0.1
war_cost_defender = 0.2
war_casualties_enabled = true
war_casualty_rate = 0.03
pillage_enabled = true
pillage_fraction = 0.2
deterrence_enabled = true
deterrence_ratio = 3.0

# ── 瘟疫 ─────────────────────────────────────────────────────────────
plague_enabled = true
n_pathogens = 4
plague_trigger_density = 30.0
plague_trigger_rate = 1e-5
plague_infection_radius = 3.0
plague_infection_rate = 0.2
plague_base_mortality = 0.3
plague_recovery_time = 3.0
plague_immunity_inheritance = 0.5

# ── 地形（程序化全球地形） ───────────────────────────────────────────
terrain_type = gaussian
terrain_scale = 1.0

# ── 输出 ─────────────────────────────────────────────────────────────
output_dir = examples/genesis_hyde_100k_output
network_window_factor = 5

# ── Checkpoint（每 500 模拟年写一次）─────────────────────────────────
checkpoint_interval = 50000
checkpoint_dir = examples/genesis_hyde_100k_output/checkpoints

# ── 控制 ─────────────────────────────────────────────────────────────
random_seed = 10000
density_update_interval = 20
