# ═══════════════════════════════════════════════════════════════════════
# Politeia 算例：genesis_hyde_baseline
#
# 名称: HYDE 创世纪 — 基线人口（1 agent = 1 人）
# 校准源: HYDE 3.3 (Klein Goldewijk et al. 2023)
# 时代:   公元前 10,000 年（新石器过渡期）
# 粒子数: 4,501,152 = HYDE 3.3 全球基线人口（与真实数量一致）
#
# 与 genesis_hyde_100k 的区别：
#   - 100k 算例：1 agent ≈ 45 真实人口（粗粒化、便于开发/调试）
#   - 本算例：   1 agent = 1 真实人口（与 HYDE 基线对齐，计算与内存代价极高）
#
# 初始条件文件（体积约数百 MB，不纳入版本库）请先生成：
#   python3 scripts/generate_genesis.py --n 4501152 --era 10000bce --seed 42 \
#       --output examples/genesis_hyde_baseline.csv
#
# 依赖：pip install numpy（或系统包 python3-numpy）
# ═══════════════════════════════════════════════════════════════════════

# ── 初始条件 ─────────────────────────────────────────────────────────
initial_conditions_file = examples/genesis_hyde_baseline.csv
initial_particles = 4501152

# ── 域：全球经纬度坐标 ───────────────────────────────────────────────
domain_xmin = -180.0
domain_xmax = 180.0
domain_ymin = -85.0
domain_ymax = 85.0

# ── 时间步 ───────────────────────────────────────────────────────────
# 粒子数约为 100k 算例的 45×：适当稀疏化输出以降低磁盘与 I/O
dt = 0.01
total_steps = 500000
output_interval = 25000
compact_interval = 5000

# ── 物理参数（全球尺度调整）─────────────────────────────────────────
temperature = 0.3
friction = 1.0
social_strength = 3.0
social_distance = 1.0
interaction_range = 3.0

# ── 资源 ─────────────────────────────────────────────────────────────
initial_wealth = 8.0
survival_threshold = 0.3
consumption_rate = 0.01
base_production = 0.3

# ── 性别与繁殖 ───────────────────────────────────────────────────────
gender_enabled = true
sex_ratio = 0.5
max_fertility = 0.003
peak_fertility_age = 22.0
puberty_age = 14.0
menopause_age = 45.0
gestation_time = 0.75
nursing_time = 2.0
male_cooldown = 0.1
mate_range = 3.0
wealth_birth_cost = 0.2
min_wealth_to_breed = 2.0
mutation_strength = 0.3
culture_mutation_scale = 0.15
epsilon_mutation_scale = 0.005
fertility_alpha = 2.0
inheritance_model = contribution

# ── 死亡（史前条件：高婴儿死亡率，低预期寿命） ──────────────────────
gompertz_alpha = 2e-4
max_age = 75.0
accident_rate = 5e-4
starvation_sigmoid_k = 10.0

# ── 寿命耦合（财富和技术延长寿命） ──────────────────────────────────
lifespan_wealth_enabled = true
lifespan_wealth_k = 15.0
lifespan_wealth_ref = 20.0
lifespan_tech_enabled = true
lifespan_tech_k = 10.0
lifespan_tech_ref = 3.0

# ── 技术演化 ─────────────────────────────────────────────────────────
tech_drift_rate = 0.0002
tech_spread_rate = 0.01
tech_jump_base_rate = 5e-6
tech_jump_magnitude = 0.3
tech_jump_knowledge_scale = 1.0

# ── 文化 ─────────────────────────────────────────────────────────────
culture_dim = 2
assimilation_rate = 0.01
culture_mate_threshold = 3.0
repulsion_threshold = 2.0

# ── 承载力 ───────────────────────────────────────────────────────────
carrying_capacity_enabled = true
carrying_capacity_base = 80.0
density_radius = 5.0

# ── 忠诚与层级 ───────────────────────────────────────────────────────
loyalty_enabled = true
tax_rate = 0.05
loyalty_protection_gain = 0.1
loyalty_tax_drain = 0.05

# ── 征服 ─────────────────────────────────────────────────────────────
conquest_enabled = true
conquest_power_ratio = 1.5
conquest_base_prob = 0.005

# ── 战争增强 ─────────────────────────────────────────────────────────
war_cost_enabled = true
war_cost_attacker = 0.1
war_cost_defender = 0.2
war_casualties_enabled = true
war_casualty_rate = 0.03
pillage_enabled = true
pillage_fraction = 0.2
deterrence_enabled = true
deterrence_ratio = 3.0

# ── 瘟疫 ─────────────────────────────────────────────────────────────
plague_enabled = true
n_pathogens = 4
plague_trigger_density = 30.0
plague_trigger_rate = 1e-5
plague_infection_radius = 3.0
plague_infection_rate = 0.2
plague_base_mortality = 0.3
plague_recovery_time = 3.0
plague_immunity_inheritance = 0.5

# ── 地形（真实 ETOPO 地形 + 交流阻抗） ──────────────────────────────
# 若无 ETOPO 文件可切换回 terrain_type = gaussian
terrain_type = grid
terrain_file = data/etopo_global.asc
terrain_scale = 1.0
terrain_barrier_enabled = true
terrain_barrier_scale = 5.0

# ── 气候（程序化全球气候场） ──────────────────────────────────────────
# 基于纬度梯度 + 海拔递减的程序化气候；亦可用 climate_mode = file 加载外部栅格
climate_enabled = true
climate_mode = procedural
climate_time_mode = drift
climate_drift_rate = 0.0005
climate_update_interval = 200
climate_production_enabled = true
climate_carrying_enabled = true
climate_mortality_enabled = true
climate_mortality_scale = 2e-4
climate_friction_enabled = true
climate_friction_scale = 0.3
climate_plague_enabled = true
climate_plague_scale = 1.5

# ── 输出 ─────────────────────────────────────────────────────────────
output_dir = examples/genesis_hyde_baseline_output
network_window_factor = 5

# ── Checkpoint（步数间隔加大，减少 PB 级跑法的写盘压力）──────────────
checkpoint_interval = 250000
checkpoint_dir = examples/genesis_hyde_baseline_output/checkpoints

# ── 控制 ─────────────────────────────────────────────────────────────
random_seed = 10001
density_update_interval = 20
