# Politeia Minimal Configuration: 1000 agents
# Phase 1-2: Spatial dynamics + resource exchange

# Domain
domain_xmin = 0.0
domain_xmax = 100.0
domain_ymin = 0.0
domain_ymax = 100.0

# Time stepping
dt = 0.01
total_steps = 10000
output_interval = 100

# Particles
initial_particles = 1000

# Langevin parameters
temperature = 1.0
friction = 1.0

# 人际空间交互力
social_strength = 1.0
social_distance = 1.0
interaction_range = 2.5

# Resources
initial_wealth = 5.0
survival_threshold = 0.1
consumption_rate = 0.002

# Output
output_dir = examples/minimal_1k_output
