# Politeia: 多盆地场景
# 模拟被山脉分隔的多个宜居盆地（类似中国：关中、中原、巴蜀、江南）
# 不同盆地独立发展文明，通过山口互动

# Domain
domain_xmin = 0.0
domain_xmax = 100.0
domain_ymin = 0.0
domain_ymax = 100.0

# Time stepping
dt = 0.01
total_steps = 30000
output_interval = 200
compact_interval = 500

# Particles
initial_particles = 2000

# Langevin parameters
temperature = 0.5
friction = 2.0

# Social interaction
social_strength = 0.8
social_distance = 1.0
interaction_range = 4.0

# Resources
initial_wealth = 5.0
survival_threshold = 0.1
consumption_rate = 0.005
base_production = 0.05

# Reproduction
max_fertility = 0.004
puberty_age = 15.0
menopause_age = 45.0

# Hierarchy
tax_rate = 0.02

# Mortality
gompertz_beta = 0.085
accident_rate = 1e-4

# Cultural vector (4D for richer diversity)
culture_dim = 4

# Terrain: 多盆地（关中/中原/巴蜀/东北）
terrain_type = basins
terrain_scale = 0.5

# Output
output_dir = examples/multi_basins_output
