# Politeia: 河谷文明场景
# 模拟河流流域（类似尼罗河/黄河/两河流域）中的文明涌现
#
# 参数平衡分析：
#   河谷中心 V ≈ -55 (terrain_scale=0.5, h_max≈110)
#   产出/步 = base_production × 55 × ε × dt = 0.05 × 55 × 1 × 0.01 = 0.0275
#   消耗/步 = consumption_rate × dt = 0.005 × 0.01 = 0.00005
#   税收/步 = tax_rate × w × dt = 0.02 × w × 0.01 = 0.0002 × w
#   稳态财富 ≈ (0.0275 - 0.00005) / 0.0002 ≈ 137  →  远高于生存阈值

# Domain
domain_xmin = 0.0
domain_xmax = 100.0
domain_ymin = 0.0
domain_ymax = 100.0

# Time stepping
dt = 0.01
total_steps = 30000
output_interval = 200
compact_interval = 500

# Particles
initial_particles = 2000

# Langevin parameters
temperature = 0.5
friction = 2.0

# Social interaction
social_strength = 0.8
social_distance = 1.0
interaction_range = 4.0

# Resources
initial_wealth = 5.0
survival_threshold = 0.1
consumption_rate = 0.005
base_production = 0.05

# Reproduction
max_fertility = 0.004
puberty_age = 15.0
menopause_age = 45.0

# Hierarchy
tax_rate = 0.02

# Mortality
gompertz_beta = 0.085
accident_rate = 1e-4

# Terrain: 合成河流流域
terrain_type = river
terrain_scale = 0.5

# Output
output_dir = examples/river_valley_output
