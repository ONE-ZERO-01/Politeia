# Politeia Parameter Scan Base Configuration
# This config is used as a template by scripts/param_scan.py
# Temperature and terrain_scale are overridden for each run

# Domain
domain_xmin = 0.0
domain_xmax = 100.0
domain_ymin = 0.0
domain_ymax = 100.0

# Time stepping
dt = 0.01
total_steps = 50000
output_interval = 500
compact_interval = 1000

# Particles
initial_particles = 500

# Langevin parameters (T is scanned)
temperature = 1.0
friction = 1.0

# Social interaction
social_strength = 1.0
social_distance = 1.0
interaction_range = 2.5

# Resources
initial_wealth = 5.0
survival_threshold = 0.1
consumption_rate = 0.002

# Culture
culture_dim = 4

# Reproduction
puberty_age = 15.0
menopause_age = 45.0

# Mortality
gompertz_beta = 0.05
accident_rate = 0.0001

# Terrain (scale is scanned)
terrain_scale = 1.0

# Output
output_dir = examples/scan_base_output
